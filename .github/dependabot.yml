version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
    open-pull-requests-limit: 5
    groups:
      workspace-dev-tools:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:30'
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: /contracts/policy-vault
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
    open-pull-requests-limit: 5
